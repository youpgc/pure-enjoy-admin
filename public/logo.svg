<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#F26522;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#FFF8F0"/>
  <!-- Logo mark: C shape + X shape merged -->
  <g fill="url(#logoGradient)">
    <!-- C shape: 75% arc -->
    <path d="M 256 106 
             A 150 150 0 1 0 256 406
             " 
          stroke="url(#logoGradient)" 
          stroke-width="52" 
          stroke-linecap="round" 
          fill="none"/>
    <!-- X shape: two crossing strokes -->
    <line x1="256" y1="140" x2="370" y2="256" 
          stroke="url(#logoGradient)" 
          stroke-width="52" 
          stroke-linecap="round"/>
    <line x1="256" y1="372" x2="370" y2="256" 
          stroke="url(#logoGradient)" 
          stroke-width="52" 
          stroke-linecap="round"/>
  </g>
</svg>
